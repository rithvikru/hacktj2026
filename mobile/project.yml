name: Geolocate3D
options:
  bundleIdPrefix: com.hacktj2026
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  Geolocate3D:
    type: application
    platform: iOS
    sources:
      - path: Sources/Geolocate3D
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hacktj2026.Geolocate3D
        INFOPLIST_KEY_NSCameraUsageDescription: "Geolocate3D needs camera access for AR room scanning and object detection."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
